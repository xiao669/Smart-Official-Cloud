<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智管云 - 登录</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      height: 100%;
      overflow: hidden;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
      background: linear-gradient(135deg, #0c4a6e 0%, #0e7490 50%, #14b8a6 100%);
    }
    
    .login-page {
      display: flex;
      height: 100vh;
      position: relative;
    }
    
    /* ========== 背景装饰 ========== */
    .bg-pattern {
      position: fixed;
      inset: 0;
      background-image: radial-gradient(rgba(255,255,255,0.08) 1px, transparent 1px);
      background-size: 50px 50px;
      pointer-events: none;
    }
    
    .bg-glow {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      animation: float 8s ease-in-out infinite;
    }
    .bg-glow-1 { width: 500px; height: 500px; background: rgba(20, 184, 166, 0.25); top: -150px; left: -100px; }
    .bg-glow-2 { width: 400px; height: 400px; background: rgba(6, 182, 212, 0.2); bottom: -100px; right: 20%; }
    
    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-20px) scale(1.03); }
    }
    
    /* ========== 左侧品牌区域 ========== */
    .brand-section {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 60px;
      position: relative;
      z-index: 1;
    }
    
    .brand-content {
      max-width: 480px;
      color: #fff;
    }
    
    .brand-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }
    
    .logo-icon {
      width: 48px;
      height: 48px;
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .logo-icon svg {
      width: 26px;
      height: 26px;
    }
    
    .logo-text {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 2px;
    }
    
    .brand-headline {
      font-size: 56px;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 24px;
    }
    
    .brand-headline .highlight {
      background: linear-gradient(90deg, #5eead4, #22d3ee);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .brand-desc {
      font-size: 18px;
      line-height: 1.8;
      color: rgba(255, 255, 255, 0.75);
      margin-bottom: 32px;
    }
    
    /* 特性列表 */
    .features {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    
    .feature-item {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      padding: 10px 16px;
      border-radius: 8px;
      transition: all 0.3s;
    }
    
    .feature-item:hover {
      background: rgba(255, 255, 255, 0.15);
      transform: translateY(-2px);
    }
    
    .feature-icon { font-size: 22px; }
    .feature-text { font-size: 15px; font-weight: 500; }
    
    /* ========== 右侧登录区域 ========== */
    .login-section {
      width: 480px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px 50px 30px 20px;
      position: relative;
      z-index: 1;
    }
    
    .login-card {
      width: 360px;
      background: rgba(255, 255, 255, 0.97);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      padding: 32px 30px;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
      position: relative;
    }
    
    /* 卡片顶部装饰条 */
    .login-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 30px;
      right: 30px;
      height: 3px;
      background: linear-gradient(90deg, #0e7490, #14b8a6, #22d3ee);
      border-radius: 0 0 3px 3px;
    }
    
    .login-header {
      text-align: center;
      margin-bottom: 24px;
    }
    
    .login-avatar {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #0e7490 0%, #14b8a6 100%);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 14px;
      box-shadow: 0 8px 24px rgba(14, 116, 144, 0.3);
    }
    
    .login-avatar svg {
      width: 28px;
      height: 28px;
      color: #fff;
    }
    
    .login-title {
      font-size: 20px;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 4px;
    }
    
    .login-subtitle {
      font-size: 13px;
      color: #64748b;
    }
    
    /* 登录方式切换 */
    .login-tabs {
      display: flex;
      background: #f1f5f9;
      border-radius: 10px;
      padding: 3px;
      margin-bottom: 20px;
    }
    
    .tab-item {
      flex: 1;
      text-align: center;
      padding: 9px 0;
      font-size: 13px;
      font-weight: 500;
      color: #64748b;
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.3s;
    }
    
    .tab-item.active {
      background: #fff;
      color: #0e7490;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.06);
    }
    
    /* 表单 */
    .form-group {
      margin-bottom: 14px;
    }
    
    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #334155;
      margin-bottom: 6px;
    }
    
    .form-input {
      width: 100%;
      height: 42px;
      padding: 0 14px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 14px;
      color: #0f172a;
      transition: all 0.2s;
      outline: none;
      background: #fff;
    }
    
    .form-input::placeholder { color: #94a3b8; }
    
    .form-input:focus {
      border-color: #0e7490;
      box-shadow: 0 0 0 3px rgba(14, 116, 144, 0.08);
    }
    
    /* 同意条款 */
    .agreement-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 16px 0;
    }
    
    .agreement-checkbox {
      width: 16px;
      height: 16px;
      accent-color: #0e7490;
      cursor: pointer;
    }
    
    .agreement-text {
      font-size: 12px;
      color: #64748b;
      line-height: 1.5;
    }
    
    .agreement-text a {
      color: #0e7490;
      text-decoration: none;
      font-weight: 500;
    }
    
    /* 登录按钮 */
    .login-btn {
      width: 100%;
      height: 44px;
      background: linear-gradient(135deg, #0e7490 0%, #14b8a6 100%);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(14, 116, 144, 0.35);
    }
    
    /* 底部链接 */
    .login-footer {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid #e2e8f0;
    }
    
    .login-footer a {
      font-size: 12px;
      color: #64748b;
      text-decoration: none;
    }
    
    .login-footer a:hover { color: #0e7490; }
    
    /* 版权信息 */
    .copyright {
      position: fixed;
      bottom: 16px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
      z-index: 10;
    }
    
    /* ========== 响应式 ========== */
    @media (max-width: 1000px) {
      .brand-headline { font-size: 32px; }
      .login-section { width: 420px; padding-right: 30px; }
    }
    
    @media (max-width: 850px) {
      .login-page { flex-direction: column; overflow-y: auto; }
      html, body { overflow: auto; }
      .brand-section { padding: 30px; text-align: center; }
      .brand-logo { justify-content: center; }
      .brand-headline { font-size: 28px; }
      .features { justify-content: center; }
      .login-section { width: 100%; padding: 20px; justify-content: center; }
      .login-card { width: 100%; max-width: 380px; }
      .copyright { position: static; padding: 20px 0; }
    }
  </style>
</head>
<body>
  <div class="bg-pattern"></div>
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>
  
  <div class="login-page">
    <!-- 左侧品牌区域 -->
    <div class="brand-section">
      <div class="brand-content">
        <div class="brand-logo">
          <div class="logo-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M19 3H5C3.89543 3 3 3.89543 3 5V19C3 20.1046 3.89543 21 5 21H19C20.1046 21 21 20.1046 21 19V5C21 3.89543 20.1046 3 19 3Z"/>
              <path d="M12 8V16M8 12H16" stroke-linecap="round"/>
            </svg>
          </div>
          <span class="logo-text">智管云</span>
        </div>
        
        <h1 class="brand-headline">
          <span class="highlight">智能</span>库存管理<br>让工作更<span class="highlight">高效</span>
        </h1>
        
        <p class="brand-desc">
          新一代企业级库存管理平台，支持药品、商品、食品等多场景管理<br>
          数据驱动，智能预警，助力企业降本增效
        </p>
        
        <div class="features">
          <div class="feature-item">
            <span class="feature-icon">📦</span>
            <span class="feature-text">智能库存</span>
          </div>
          <div class="feature-item">
            <span class="feature-icon">🔔</span>
            <span class="feature-text">效期预警</span>
          </div>
          <div class="feature-item">
            <span class="feature-icon">📊</span>
            <span class="feature-text">数据分析</span>
          </div>
          <div class="feature-item">
            <span class="feature-icon">📱</span>
            <span class="feature-text">多端同步</span>
          </div>
        </div>
      </div>
    </div>
    
    <!-- 右侧登录区域 -->
    <div class="login-section">
      <div class="login-card">
        <div class="login-header">
          <div class="login-avatar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
          </div>
          <h2 class="login-title">欢迎回来</h2>
          <p class="login-subtitle">登录您的账号以继续</p>
        </div>
        
        <div class="login-tabs">
          <div class="tab-item active">账号密码</div>
          <div class="tab-item">短信验证码</div>
        </div>
        
        <form>
          <div class="form-group">
            <label class="form-label">用户名</label>
            <input type="text" class="form-input" placeholder="请输入用户名">
          </div>
          
          <div class="form-group">
            <label class="form-label">密码</label>
            <input type="password" class="form-input" placeholder="请输入密码">
          </div>
          
          <div class="agreement-wrap">
            <input type="checkbox" class="agreement-checkbox" id="agree" checked>
            <label class="agreement-text" for="agree">
              我已阅读并同意 <a href="#">《免责声明》</a> 和 <a href="#">《使用条款》</a>
            </label>
          </div>
          
          <button type="submit" class="login-btn">登 录</button>
        </form>
        
        <div class="login-footer">
          <a href="#">关于我们</a>
          <a href="#">免责声明</a>
        </div>
      </div>
    </div>
  </div>
  
  <p class="copyright">© 2026智管云 · 专业库存管理平台</p>
</body>
</html>
